<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EE8208"/>
      <stop offset="100%" style="stop-color:#d87304"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#fff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#shine)"/>
  <!-- Letter E stylized -->
  <text x="256" y="390" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="380" fill="#fff" letter-spacing="-10">E</text>
  <!-- Graduation cap accent -->
  <polygon points="256,52 340,95 256,115 172,95" fill="#fff" opacity="0.9"/>
  <rect x="248" y="95" width="16" height="30" rx="3" fill="#fff" opacity="0.9"/>
</svg>
